<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <g fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main wall -->
    <rect x="200" y="280" width="400" height="270" fill="#888" fill-opacity="0.04"/>
    <!-- Left tower -->
    <rect x="150" y="180" width="100" height="370" fill="#888" fill-opacity="0.05"/>
    <!-- Right tower -->
    <rect x="550" y="180" width="100" height="370" fill="#888" fill-opacity="0.05"/>
    <!-- Left tower battlements -->
    <rect x="150" y="160" width="20" height="30"/>
    <rect x="180" y="160" width="20" height="30"/>
    <rect x="210" y="160" width="20" height="30"/>
    <!-- Right tower battlements -->
    <rect x="550" y="160" width="20" height="30"/>
    <rect x="580" y="160" width="20" height="30"/>
    <rect x="610" y="160" width="20" height="30"/>
    <!-- Center battlements -->
    <rect x="260" y="260" width="20" height="30"/>
    <rect x="290" y="260" width="20" height="30"/>
    <rect x="320" y="260" width="20" height="30"/>
    <rect x="350" y="260" width="20" height="30"/>
    <rect x="380" y="260" width="20" height="30"/>
    <rect x="410" y="260" width="20" height="30"/>
    <rect x="440" y="260" width="20" height="30"/>
    <rect x="470" y="260" width="20" height="30"/>
    <rect x="500" y="260" width="20" height="30"/>
    <rect x="530" y="260" width="20" height="30"/>
    <!-- Gate -->
    <path d="M350 550 L350 430 Q400 380 450 430 L450 550" fill="#888" fill-opacity="0.06"/>
    <!-- Gate grid lines -->
    <line x1="380" y1="430" x2="380" y2="550"/>
    <line x1="420" y1="430" x2="420" y2="550"/>
    <line x1="350" y1="470" x2="450" y2="470"/>
    <line x1="350" y1="510" x2="450" y2="510"/>
    <!-- Left tower window -->
    <path d="M185 280 Q200 260 215 280 L215 320 L185 320 Z" fill="#888" fill-opacity="0.06"/>
    <!-- Right tower window -->
    <path d="M585 280 Q600 260 615 280 L615 320 L585 320 Z" fill="#888" fill-opacity="0.06"/>
    <!-- Left tower flag pole -->
    <line x1="200" y1="100" x2="200" y2="160"/>
    <!-- Left flag -->
    <path d="M200 100 L240 115 L200 130" fill="#888" fill-opacity="0.05"/>
    <!-- Right tower flag pole -->
    <line x1="600" y1="100" x2="600" y2="160"/>
    <!-- Right flag -->
    <path d="M600 100 L640 115 L600 130" fill="#888" fill-opacity="0.05"/>
    <!-- Wall windows -->
    <circle cx="300" cy="380" r="18" fill="#888" fill-opacity="0.05"/>
    <circle cx="500" cy="380" r="18" fill="#888" fill-opacity="0.05"/>
  </g>
</svg>