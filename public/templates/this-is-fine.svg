<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Table -->
  <rect x="200" y="280" width="400" height="15" rx="3" fill="#888" fill-opacity="0.1"/>
  <line x1="230" y1="295" x2="230" y2="420"/>
  <line x1="570" y1="295" x2="570" y2="420"/>

  <!-- Coffee mug on table -->
  <rect x="450" y="248" width="40" height="32" rx="4" fill="#888" fill-opacity="0.08"/>
  <path d="M490 258 Q505 258 505 270 Q505 280 490 280"/>
  <path d="M455 248 Q460 240 465 248"/>

  <!-- Dog body sitting on chair behind table -->
  <!-- Chair back -->
  <rect x="310" y="170" width="120" height="110" rx="8" fill="#888" fill-opacity="0.05"/>

  <!-- Dog head -->
  <ellipse cx="370" cy="200" rx="42" ry="38" fill="#888" fill-opacity="0.08"/>

  <!-- Dog ears (floppy) -->
  <path d="M335 180 Q320 160 325 190" fill="#888" fill-opacity="0.08"/>
  <path d="M405 180 Q420 160 415 190" fill="#888" fill-opacity="0.08"/>

  <!-- Dog eyes -->
  <circle cx="355" cy="195" r="4" fill="#888" stroke="none"/>
  <circle cx="385" cy="195" r="4" fill="#888" stroke="none"/>

  <!-- Dog snout -->
  <ellipse cx="370" cy="215" rx="15" ry="10" fill="#888" fill-opacity="0.08"/>
  <circle cx="370" cy="212" r="3" fill="#888" stroke="none"/>
  <!-- Smile -->
  <path d="M360 220 Q370 228 380 220" fill="none"/>

  <!-- Dog body (visible above table) -->
  <path d="M340 238 L340 275 L400 275 L400 238" fill="#888" fill-opacity="0.05"/>

  <!-- Hat -->
  <rect x="348" y="158" width="44" height="8" rx="2" fill="#888" fill-opacity="0.1"/>
  <rect x="355" y="138" width="30" height="22" rx="3" fill="#888" fill-opacity="0.08"/>

  <!-- Flames -->
  <g stroke="#888" stroke-width="2" fill="#888" fill-opacity="0.06">
    <path d="M140 420 Q130 350 160 380 Q150 310 180 360 Q175 290 200 350 Q195 300 220 370 Q210 320 240 400 L140 420Z"/>
    <path d="M550 420 Q560 340 590 380 Q580 300 620 360 Q610 270 650 350 Q640 290 680 370 Q670 310 700 400 L550 420Z"/>
    <path d="M100 420 Q110 370 130 400 Q120 340 150 390 L100 420Z"/>
    <path d="M680 420 Q690 360 710 400 Q700 320 730 380 L680 420Z"/>
  </g>

</svg>
