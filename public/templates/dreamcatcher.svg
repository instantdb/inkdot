    <!-- Web - innermost ring -->
    <polygon points="400,185 425,198 425,242 400,255 375,242 375,198" fill="#888" fill-opacity="0.05" stroke-width="1"/>
    <!-- Center circle -->
    <circle cx="400" cy="220" r="15" fill="#888" fill-opacity="0.06"/>
