    <circle cx="310" cy="158" r="4" fill="#888" fill-opacity="0.08"/>
    <circle cx="490" cy="282" r="4" fill="#888" fill-opacity="0.08"/>
    <circle cx="310" cy="282" r="4" fill="#888" fill-opacity="0.08"/>
