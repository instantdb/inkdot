    <circle cx="400" cy="220" r="150" fill="#888" fill-opacity="0.03"/>
    <!-- Inner decorative ring -->
    <circle cx="400" cy="220" r="142" fill="none" stroke-width="1.5" stroke-opacity="0.4"/>
