    <circle cx="335" cy="400" r="5" fill="#888" fill-opacity="0.07"/>
    <circle cx="400" cy="410" r="5" fill="#888" fill-opacity="0.07"/>
    <circle cx="465" cy="400" r="5" fill="#888" fill-opacity="0.07"/>
    <!-- Left feather -->
    <path d="M330,440 L325,460 Q310,470 305,490 Q300,510 310,520 Q315,510 320,490 Q325,475 330,465" fill="#888" fill-opacity="0.05"/>
    <line x1="320" y1="445" x2="310" y2="520" stroke-width="1.5"/>
