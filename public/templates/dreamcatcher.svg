    <line x1="400" y1="78" x2="400" y2="115" stroke-width="1"/>
    <line x1="527" y1="145" x2="490" y2="158" stroke-width="1"/>
    <line x1="527" y1="295" x2="490" y2="282" stroke-width="1"/>
    <line x1="400" y1="362" x2="400" y2="325" stroke-width="1"/>
    <line x1="273" y1="295" x2="310" y2="282" stroke-width="1"/>
