    <line x1="392" y1="455" x2="382" y2="545" stroke-width="1.5"/>
    <path d="M384,480 L374,477" stroke-width="1"/>
    <path d="M383,500 L373,498" stroke-width="1"/>
    <path d="M382,520 L373,518" stroke-width="1"/>
    <!-- Right feather -->
    <path d="M470,440 L475,460 Q490,470 495,490 Q500,510 490,520 Q485,510 480,490 Q475,475 470,465" fill="#888" fill-opacity="0.05"/>
    <line x1="480" y1="445" x2="490" y2="520" stroke-width="1.5"/>
    <path d="M490,470 L500,465" stroke-width="1"/>
    <path d="M492,485 L502,482" stroke-width="1"/>
    <path d="M491,500 L500,498" stroke-width="1"/>
    <!-- Hanging loop at top -->
    <path d="M390,70 Q400,55 410,70" fill="none"/>
    <line x1="390" y1="70" x2="395" y2="78"/>
    <line x1="410" y1="70" x2="405" y2="78"/>
