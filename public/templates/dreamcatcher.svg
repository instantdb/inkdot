    <line x1="400" y1="115" x2="400" y2="155" stroke-width="1"/>
    <line x1="490" y1="158" x2="450" y2="178" stroke-width="1"/>
    <line x1="490" y1="282" x2="450" y2="262" stroke-width="1"/>
    <line x1="400" y1="325" x2="400" y2="285" stroke-width="1"/>
    <line x1="310" y1="282" x2="350" y2="262" stroke-width="1"/>
    <line x1="310" y1="158" x2="350" y2="178" stroke-width="1"/>
