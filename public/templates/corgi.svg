    <!-- Right ear -->
    <path d="M280,150 Q290,90 310,85 Q330,90 320,145" fill="#888" fill-opacity="0.06"/>
    <!-- Eye -->
    <circle cx="240" cy="195" r="8" fill="#888" fill-opacity="0.07"/>
    <circle cx="240" cy="193" r="3" fill="#888" fill-opacity="0.08"/>
    <!-- Nose -->
    <ellipse cx="200" cy="230" rx="12" ry="8" fill="#888" fill-opacity="0.07"/>
