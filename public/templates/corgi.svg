    <path d="M200,250 Q180,200 210,170 Q240,145 280,150 Q310,155 320,180 Q330,210 310,250 Q280,270 240,265 Q210,260 200,250 Z" fill="#888" fill-opacity="0.05"/>
    <!-- Left ear -->
