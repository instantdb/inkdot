<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <g fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body -->
    <ellipse cx="400" cy="340" rx="180" ry="80" fill="#888" fill-opacity="0.05"/>
    <!-- Chest/front body -->
    <path d="M260,300 Q240,280 250,260 Q260,340 270,360" fill="#888" fill-opacity="0.04"/>
