    <path d="M400,260 L400,100 Q430,100 440,130 L415,260" fill="#888" fill-opacity="0.04"/>
    <line x1="408" y1="130" x2="408" y2="240"/>
    <line x1="400" y1="160" x2="430" y2="155"/>
    <line x1="400" y1="200" x2="425" y2="197"/>
