    <circle cx="540" cy="205" r="22" fill-opacity="0.04"/>
    <circle cx="560" cy="280" r="22" fill-opacity="0.04"/>
    <circle cx="540" cy="360" r="22" fill-opacity="0.04"/>
    <circle cx="490" cy="420" r="22" fill-opacity="0.04"/>
    <circle cx="420" cy="458" r="22" fill-opacity="0.04"/>
    <circle cx="340" cy="450" r="22" fill-opacity="0.04"/>
