<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Boba tea / Bubble tea -->

  <!-- Cup (tapered) -->
  <path d="M290 140 L310 500 Q310 530 340 530 L460 530 Q490 530 490 500 L510 140" fill="#888" fill-opacity="0.04"/>

  <!-- Lid (dome) -->
  <path d="M280 140 Q280 110 400 100 Q520 110 520 140 Q520 155 400 160 Q280 155 280 140" fill="#888" fill-opacity="0.06"/>

  <!-- Straw (thick, angled) -->
  <path d="M430 40 L420 100" stroke-width="8" opacity="0.2"/>
  <path d="M420 160 L405 400" stroke-width="8" opacity="0.15"/>
  <!-- Straw tip (pointed) -->
  <path d="M401 400 L408 420 L412 400" stroke-width="2" opacity="0.15"/>

  <!-- Liquid level -->
  <path d="M300 200 Q400 190 500 200" stroke-width="1.5" opacity="0.15"/>

  <!-- Boba pearls at bottom -->
  <g fill="#888" fill-opacity="0.1" stroke-width="1.5">
    <circle cx="350" cy="480" r="16"/>
    <circle cx="385" cy="485" r="16"/>
    <circle cx="420" cy="482" r="16"/>
    <circle cx="455" cy="478" r="16"/>
    <circle cx="340" cy="450" r="16"/>
    <circle cx="375" cy="455" r="16"/>
    <circle cx="410" cy="452" r="16"/>
    <circle cx="445" cy="448" r="16"/>
    <circle cx="470" cy="460" r="16"/>
    <circle cx="360" cy="425" r="16"/>
    <circle cx="395" cy="428" r="16"/>
    <circle cx="430" cy="422" r="16"/>
    <circle cx="465" cy="432" r="16"/>
    <circle cx="330" cy="425" r="14"/>
  </g>

  <!-- Condensation drops -->
  <g fill="#888" fill-opacity="0.06" stroke="none">
    <ellipse cx="300" cy="250" rx="6" ry="8"/>
    <ellipse cx="310" cy="320" rx="5" ry="7"/>
    <ellipse cx="500" cy="280" rx="5" ry="7"/>
    <ellipse cx="495" cy="370" rx="6" ry="8"/>
  </g>

  <!-- Cup shine -->
  <path d="M305 200 L320 480" stroke-width="1" opacity="0.1"/>
</svg>
