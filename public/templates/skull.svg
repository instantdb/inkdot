<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cranium -->
  <path d="M280 250 Q280 120 400 90 Q520 120 520 250 Q520 310 500 340 L500 380 Q500 400 480 400 L320 400 Q300 400 300 380 L300 340 Q280 310 280 250Z" fill="#888" fill-opacity="0.05"/>

  <!-- Eye sockets -->
  <ellipse cx="350" cy="240" rx="40" ry="45" fill="#888" fill-opacity="0.06"/>
  <ellipse cx="450" cy="240" rx="40" ry="45" fill="#888" fill-opacity="0.06"/>

  <!-- Inner eye darkness -->
  <ellipse cx="350" cy="245" rx="25" ry="30" fill="#888" fill-opacity="0.04"/>
  <ellipse cx="450" cy="245" rx="25" ry="30" fill="#888" fill-opacity="0.04"/>

  <!-- Nose cavity -->
  <path d="M385 300 L400 330 L415 300 Q405 290 395 290Z" fill="#888" fill-opacity="0.06"/>

  <!-- Teeth -->
  <g stroke-width="1.5">
    <line x1="340" y1="380" x2="340" y2="400" opacity="0.3"/>
    <line x1="360" y1="380" x2="360" y2="405" opacity="0.3"/>
    <line x1="380" y1="380" x2="380" y2="408" opacity="0.3"/>
    <line x1="400" y1="380" x2="400" y2="410" opacity="0.3"/>
    <line x1="420" y1="380" x2="420" y2="408" opacity="0.3"/>
    <line x1="440" y1="380" x2="440" y2="405" opacity="0.3"/>
    <line x1="460" y1="380" x2="460" y2="400" opacity="0.3"/>
  </g>

  <!-- Jaw line -->
  <path d="M310 400 Q310 440 340 450 Q370 455 400 455 Q430 455 460 450 Q490 440 490 400" fill="none" stroke-width="2"/>

  <!-- Lower teeth -->
  <g stroke-width="1.5">
    <line x1="350" y1="450" x2="350" y2="435" opacity="0.3"/>
    <line x1="375" y1="452" x2="375" y2="435" opacity="0.3"/>
    <line x1="400" y1="455" x2="400" y2="435" opacity="0.3"/>
    <line x1="425" y1="452" x2="425" y2="435" opacity="0.3"/>
    <line x1="450" y1="450" x2="450" y2="435" opacity="0.3"/>
  </g>

  <!-- Cheekbone -->
  <path d="M290 280 Q285 300 295 320" stroke-width="1.5" opacity="0.2"/>
  <path d="M510 280 Q515 300 505 320" stroke-width="1.5" opacity="0.2"/>

  <!-- Crack detail -->
  <path d="M420 110 Q425 140 415 170 Q420 180 430 175" stroke-width="1" opacity="0.15"/>
</svg>
