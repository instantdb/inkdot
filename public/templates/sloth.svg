    <path d="M320 410 C310 450 300 480 310 500" fill="none" stroke-width="3"/>
    <!-- Left foot claws - long curved hooks -->
    <path d="M298 496 C290 512 300 520 310 512" fill="none" stroke-width="3"/>
    <path d="M308 498 C302 516 312 524 322 514" fill="none" stroke-width="3"/>
    <path d="M318 496 C314 514 324 520 334 510" fill="none" stroke-width="3"/>
    <!-- Right leg hanging -->
    <path d="M460 405 C470 445 480 475 470 498" fill="none" stroke-width="3"/>
    <!-- Right foot claws - long curved hooks -->
    <path d="M458 494 C450 512 460 520 470 510" fill="none" stroke-width="3"/>
    <path d="M468 496 C462 516 472 524 482 512" fill="none" stroke-width="3"/>
    <path d="M478 494 C474 514 484 520 494 508" fill="none" stroke-width="3"/>
    <!-- Fur texture - short v-marks -->
    <g fill="none" stroke-opacity="0.25" stroke-width="1.5">
      <path d="M310 260 C315 255 320 260"/>
      <path d="M460 270 C465 265 470 270"/>
      <path d="M350 380 C355 375 360 380"/>
      <path d="M420 370 C425 365 430 370"/>
      <path d="M300 300 C305 295 310 300"/>
      <path d="M470 310 C475 305 480 310"/>
      <path d="M340 340 C345 335 350 340"/>
      <path d="M430 400 C435 395 440 400"/>
      <path d="M370 260 C375 255 380 260"/>
      <path d="M400 420 C405 415 410 420"/>
      <path d="M320 360 C325 355 330 360"/>
      <path d="M450 350 C455 345 460 350"/>
