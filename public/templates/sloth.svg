    <!-- Longer shaggy fur strokes -->
    <g fill="none" stroke-opacity="0.15" stroke-width="1.8">
      <!-- Arms -->
      <path d="M288 155 Q282 165 286 175"/>
      <path d="M296 170 Q290 182 294 192"/>
      <path d="M492 160 Q498 170 494 180"/>
      <path d="M484 175 Q490 187 486 197"/>
      <!-- Body sides -->
      <path d="M278 280 Q272 295 278 310"/>
      <path d="M282 320 Q276 335 282 348"/>
      <path d="M500 290 Q506 305 500 318"/>
      <path d="M496 330 Q502 345 496 358"/>
      <!-- Bottom -->
      <path d="M330 420 Q325 432 330 442"/>
      <path d="M450 415 Q455 428 450 438"/>
