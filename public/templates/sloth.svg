    <path d="M278 122 C270 104 280 96 290 106" fill="none" stroke-width="3"/>
    <path d="M288 122 C282 102 292 94 302 104" fill="none" stroke-width="3"/>
    <path d="M298 125 C294 105 304 98 314 108" fill="none" stroke-width="3"/>
